media:
  - name: images
    label: Images
    input: public/images
    output: /images
    categories: [image]
    extensions: [jpg, jpeg, png, webp, gif]
    rename: safe

content:
  - name: post
    label: Blog Posts
    type: collection
    path: src/content/blog
    format: yaml-frontmatter
    filename: "{fields.slug}.md"
    view:
      fields: [title, pubDatetime, draft, tags]
      primary: title
      sort: [pubDatetime, desc]
    fields:
      - name: title
        label: Title
        type: string
        required: true

      - name: slug
        label: Slug
        type: string
        description: URL segment and filename (e.g. my-post-title). Do not change after publishing.

      - name: description
        label: Description
        type: text
        description: Short summary for listings and SEO

      - name: coverImage
        label: Cover Image
        type: image
        options:
          media: images

      - name: pubDatetime
        label: Published Date
        type: date
        required: true

      - name: modDatetime
        label: Modified Date
        type: date

      - name: draft
        label: Draft
        type: boolean
        default: false

      - name: featured
        label: Featured
        type: boolean
        default: false

      - name: tags
        label: Tags
        type: string
        list: true

      - name: body
        label: Content
        type: rich-text
        options:
          media: images
